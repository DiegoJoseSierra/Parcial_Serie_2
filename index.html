<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parcial Serie 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      color: #a0aec0;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .name {
      color: #ffffff;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 30px rgba(99, 179, 237, 0.5);
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #63b3ed, #b794f4);
      margin: 24px auto;
      border-radius: 2px;
    }

    .info {
      color: #718096;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Estudiante</p>
    <h1 class="name">Diego José Sierra Cárcamo</h1>
    <div class="divider"></div>
    <p class="info">Parcial Serie 2 &mdash; Aplicación Web</p>
  </div>
</body>
</html>
